<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add me on Play Me</title>

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Play Me" />
  <meta property="og:description" content="I found this app where we can send songs to each other's home screen — you should add me!" />
  <meta property="og:image" content="https://rork-play-me.web.app/og-image.png" />
  <meta property="og:url" content="https://rork-play-me.web.app/invite" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Play Me" />
  <meta name="twitter:description" content="I found this app where we can send songs to each other's home screen — you should add me!" />
  <meta name="twitter:image" content="https://rork-play-me.web.app/og-image.png" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #000;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 24px;
    }
    h1 { font-size: 2rem; margin-bottom: 12px; }
    p { font-size: 1.1rem; opacity: 0.7; max-width: 320px; margin-bottom: 32px; }
    .btn {
      display: inline-block;
      background: #fff;
      color: #000;
      font-weight: 700;
      font-size: 1rem;
      padding: 14px 36px;
      border-radius: 999px;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <h1>Play Me</h1>
  <p>Send songs to your friends' home screens. Download the app to get started.</p>
  <a class="btn" href="https://apps.apple.com/app/playme" id="download">Download Play Me</a>

  <script>
    // Try opening the app first; fall back to App Store
    var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
    if (isIOS) {
      var path = window.location.pathname;
      window.location.href = 'playme:/' + path;
      setTimeout(function () {
        window.location.href = document.getElementById('download').href;
      }, 1500);
    }
  </script>
</body>
</html>
